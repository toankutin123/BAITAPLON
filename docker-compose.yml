version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: baitaplon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: real_estate_ai
    ports:
      - "5432:5432"
    volumes:
      - baitaplon_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Python (Single unified backend)
  backend:
    build:
      context: ./backend_py
      dockerfile: Dockerfile
    container_name: baitaplon-backend
    restart: unless-stopped
    environment:
      PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: real_estate_ai
      JWT_SECRET: your_jwt_secret_key_change_this_in_production
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_API_URL: https://api.anthropic.com/v1/complete
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend_py:/app
      - ./bds_tool:/app/bds_tool

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: baitaplon-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  baitaplon_data:
